<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <button onclick="
      const randomNumber = Math.random();
      let res = '';

      let computerMove = '';
      if (randomNumber < 1 / 3) {
        computerMove = 'rock';
        res = 'Tie';
      } else if (randomNumber < 2 / 3) {
        computerMove = 'paper';
        res = 'You lose!';
      } else {
        computerMove = 'scissors';
        res = 'You win!';
      }

      alert(`You chose rock. Computer chose ${computerMove}. ${res}`);

    ">Rock</button>
