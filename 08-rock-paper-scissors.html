<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissors</title>
</head>
<body>
<button onclick="
      const playerMove = 'rock';
      playGame(playerMove);
    ">Rock</button>

<button onclick="
      const playerMove = 'paper';
      playGame(playerMove);
    ">Paper</button>

<button onclick="
      const playerMove = 'scissors';
      playGame(playerMove);
    ">Scissors</button>

<button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
    ">Reset Score</button>

<script>
  // when score is null, default is 0 for all score values
  let score = JSON.parse(localStorage.getItem('score')) || {
    wins: 0,
    losses: 0,
    ties: 0
  };

  function playGame(playerMove) {
    let res = '';
    const computerMove = pickComputerMove();

    if (playerMove === 'rock') {
      if (computerMove === 'rock') {
        res = 'Tie';
      } else if (computerMove === 'paper') {
        res = 'You lose!';
      } else {
        res = 'You win!';
      }
    } else if (playerMove === 'paper') {
      if (computerMove === 'rock') {
        res = 'You win!';
      } else if (computerMove === 'paper') {
        res = 'Tie';
      } else {
        res = 'You lose!';
      }
    } else {
      if (computerMove === 'rock') {
        res = 'You lose!';
      } else if (computerMove === 'paper') {
        res = 'You win!';
      } else {
        res = 'Tie';
      }
    }

    if (res === 'Tie') {
      score.ties++;
    } else if (res === 'You lose!') {
      score.losses++;
      } else {
      score.wins++;
    }
    // saving to local storage lets u keep the scores even after refresh, but must be stored as string (JSON format)
    localStorage.setItem('score', JSON.stringify(score));

    alert(`You chose ${playerMove}. Computer chose ${computerMove}. ${res}`
    + `\nWins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`);
  }

  function pickComputerMove() {
    const randomNumber = Math.random();
    if (randomNumber < 1 / 3) {
      computerMove = 'rock';
    } else if (randomNumber < 2 / 3) {
      computerMove = 'paper';
    } else {
      computerMove = 'scissors';
    }
    return computerMove;
  }
</script>
</body>
</html>
