<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissors</title>
</head>
<body>
<button onclick="
      const playerMove = 'rock';
      playGame(playerMove, computerMove);
    ">Rock</button>

<button onclick="
      const playerMove = 'paper';
      playGame(playerMove, computerMove);
    ">Paper</button>

<button onclick="
      const playerMove = 'scissors';
      playGame(playerMove, computerMove);
    ">Scissors</button>

<script>
  function playGame(playerMove) {
    let res = '';
    const computerMove = pickComputerMove();

    if (playerMove === 'rock') {
      if (computerMove === 'rock') {
        res = 'Tie';
      } else if (computerMove === 'paper') {
        res = 'You lose!';
      } else {
        res = 'You win!';
      }
    } else if (playerMove === 'paper') {
      if (computerMove === 'rock') {
        res = 'You win!';
      } else if (computerMove === 'paper') {
        res = 'Tie';
      } else {
        res = 'You lose!';
      }
    } else {
      if (computerMove === 'rock') {
        res = 'You lose!';
      } else if (computerMove === 'paper') {
        res = 'You win!';
      } else {
        res = 'Tie';
      }
    }


    alert(`You chose ${playerMove}. Computer chose ${computerMove}. ${res}`);
  }

  function pickComputerMove() {
    const randomNumber = Math.random();
    if (randomNumber < 1 / 3) {
      computerMove = 'rock';
    } else if (randomNumber < 2 / 3) {
      computerMove = 'paper';
    } else {
      computerMove = 'scissors';
    }
    return computerMove;
  }
</script>
</body>
</html>
